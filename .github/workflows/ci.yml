name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── TypeScript packages ────────────────────────────────────────────────────
  typescript:
    name: TypeScript (Build & Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Lint
        run: pnpm lint

  # ── Go API Gateway ────────────────────────────────────────────────────────
  golang:
    name: Go API (Build & Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: packages/api/go.sum

      - name: Build
        run: cd packages/api && go build ./...

      - name: Test
        run: cd packages/api && go test -race -coverprofile=coverage.out ./...

      - name: Vet
        run: cd packages/api && go vet ./...

  # ── Rust Blockchain ────────────────────────────────────────────────────────
  rust:
    name: Rust Blockchain (Build & Test)
    runs-on: ubuntu-latest
    if: ${{ hashFiles('packages/blockchain/Cargo.toml') != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/blockchain

      - name: Check
        run: cd packages/blockchain && cargo check --release

      - name: Test
        run: cd packages/blockchain && cargo test

      - name: Clippy
        run: cd packages/blockchain && cargo clippy -- -D warnings

  # ── Security Audit ─────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - name: npm audit
        run: pnpm audit --audit-level=high

      - name: Go vulnerability check
        uses: golang/govulncheck-action@v1
        with:
          work-dir: packages/api

  # ── Docker Build ───────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' && hashFiles('packages/api/Dockerfile') != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: packages/api
          push: false
          tags: uddi/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
