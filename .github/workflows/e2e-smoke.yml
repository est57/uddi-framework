name: E2E Smoke

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  docker-smoke:
    name: Docker API + SDK
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Docker stack
        run: pnpm docker:dev

      - name: Run E2E smoke test
        run: pnpm e2e:smoke

      - name: Show Docker logs on failure
        if: failure()
        run: docker compose -f infra/docker/docker-compose.dev.yml logs --no-color

      - name: Stop Docker stack
        if: always()
        run: pnpm docker:dev:down
