name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13'
          cache: 'pnpm'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/api/go.mod
          cache: true
          cache-dependency-path: packages/api/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: pnpm check

      - name: Preview npm package contents
        run: pnpm pack:dry-run

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: packages/api
          push: false
          tags: uddi/api:${{ github.ref_name }}

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate
      - docker
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          body: |
            UDDI framework release ${{ github.ref_name }}.

            Validation completed:
            - TypeScript build/test/lint
            - Go build/test/vet
            - npm package dry-run
            - Docker API image build
